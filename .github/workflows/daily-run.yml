name: Daily Carousel
on:
  schedule:
    - cron: '30 17 * * *'   # 2:30am KST (UTC+9 → 17:30 UTC)
    - cron: '30 7 * * *'    # 5:30pm AEST (UTC+10 → 07:30 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Korean fonts for screenshot fallback
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-noto-cjk fonts-noto-cjk-extra && fc-cache -f

      - name: Install browser for screenshots
        run: npx puppeteer browsers install chrome

      - name: Run daily pipeline
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: claude --dangerously-skip-permissions -p "/daily-run"

      - name: Upload screenshots
        uses: actions/upload-artifact@v5
        if: success()
        with:
          name: carousel-pngs
          path: outputs/
          if-no-files-found: warn
          retention-days: 7
          overwrite: true

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add outputs/ topic-memory.json
          git diff --cached --quiet || git commit -m "carousel: ${{ github.run_id }}"
          git push origin main
