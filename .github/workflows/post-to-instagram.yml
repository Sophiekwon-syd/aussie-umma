name: Post to Instagram
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date directory (YYYY-MM-DD). Leave empty for today (UTC).'
        required: false
        default: ''

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post carousels to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            node scripts/post-to-instagram.mjs --date "${{ github.event.inputs.date }}"
          else
            node scripts/post-to-instagram.mjs
          fi

      - name: Commit instagram-log.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add outputs/*/instagram-log.json
          git diff --cached --quiet || git commit -m "instagram: posted run ${{ github.run_id }}"
          git push origin main
